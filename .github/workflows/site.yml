name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  repository_dispatch:
    types: [site]
  workflow_dispatch:
jobs:
  release:
    name: Deploy status page
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Build site
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
      - name: Prepare and deploy
        run: |
          EXPORT_DIR=$(find $GITHUB_WORKSPACE -path "*__sapper__/export" -type d | head -1)
          mkdir -p /tmp/site-output
          cp -r "$EXPORT_DIR"/* /tmp/site-output/
          # Include data files for local access
          [ -d "$GITHUB_WORKSPACE/history" ] && cp -r "$GITHUB_WORKSPACE/history" /tmp/site-output/
          [ -d "$GITHUB_WORKSPACE/api" ] && cp -r "$GITHUB_WORKSPACE/api" /tmp/site-output/
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: /tmp/site-output
          cname: status.kora.maxwi.com
