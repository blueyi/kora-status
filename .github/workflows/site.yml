name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  repository_dispatch:
    types: [site]
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'status-page/**'
      - '.upptimerc.yml'
jobs:
  release:
    name: Deploy status page
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./status-page
          cname: status.kora.maxwi.com
