name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  repository_dispatch:
    types: [site]
  workflow_dispatch:
jobs:
  release:
    name: Deploy status page
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Build site
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
      - name: Find export directory
        id: find-export
        run: |
          echo "=== Searching for __sapper__/export ==="
          find /home/runner -path "*__sapper__/export" -type d 2>/dev/null || true
          find $GITHUB_WORKSPACE -path "*__sapper__/export" -type d 2>/dev/null || true
          EXPORT_DIR=$(find /home/runner -path "*__sapper__/export" -type d 2>/dev/null | head -1)
          if [ -z "$EXPORT_DIR" ]; then
            EXPORT_DIR=$(find $GITHUB_WORKSPACE -path "*__sapper__/export" -type d 2>/dev/null | head -1)
          fi
          if [ -z "$EXPORT_DIR" ]; then
            echo "ERROR: __sapper__/export not found!"
            find /home/runner/work -maxdepth 5 -name "*.html" -type f 2>/dev/null | head -5
            exit 1
          fi
          echo "export_dir=$EXPORT_DIR" >> $GITHUB_OUTPUT
      - name: Prepare output
        run: |
          mkdir -p /tmp/site-output
          cp -r "${{ steps.find-export.outputs.export_dir }}"/* /tmp/site-output/
          [ -d "$GITHUB_WORKSPACE/history" ] && cp -r "$GITHUB_WORKSPACE/history" /tmp/site-output/
          [ -d "$GITHUB_WORKSPACE/api" ] && cp -r "$GITHUB_WORKSPACE/api" /tmp/site-output/
          ls -la /tmp/site-output/
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: /tmp/site-output
          cname: status.kora.maxwi.com
