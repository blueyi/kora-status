name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.39.0
        with:
          command: site
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Prepare site output
        run: |
          EXPORT_DIR=$(find $GITHUB_WORKSPACE -path "*__sapper__/export" -type d | head -1)
          echo "Export dir: $EXPORT_DIR"
          mkdir -p /tmp/site-output
          cp -r "$EXPORT_DIR"/* /tmp/site-output/
          # Also copy data files so the SPA can read them locally
          if [ -d "$GITHUB_WORKSPACE/history" ]; then
            mkdir -p /tmp/site-output/history
            cp -r "$GITHUB_WORKSPACE/history/"* /tmp/site-output/history/
          fi
          if [ -d "$GITHUB_WORKSPACE/api" ]; then
            mkdir -p /tmp/site-output/api
            cp -r "$GITHUB_WORKSPACE/api/"* /tmp/site-output/api/
          fi
          ls -la /tmp/site-output/
          ls -la /tmp/site-output/history/ 2>/dev/null || echo "no history"
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: /tmp/site-output
          cname: status.kora.maxwi.com
