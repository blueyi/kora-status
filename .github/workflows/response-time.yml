name: Response Time CI
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  response-time:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.39.0
        with:
          command: response-time
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
