owner: blueyi
repo: kora-status

sites:
  - name: Kora Platform
    url: https://kora.maxwi.com
    icon: https://kora.maxwi.com/favicon.ico
    maxResponseTime: 5000

  - name: Kora API
    url: https://api.kora.maxwi.com/health
    icon: https://kora.maxwi.com/favicon.ico
    maxResponseTime: 3000
    expectedStatusCodes:
      - 200

  - name: Kora Hub
    url: https://kora.maxwi.com/hub
    maxResponseTime: 5000

  - name: Admin Panel
    url: https://admin.kora.maxwi.com
    maxResponseTime: 5000

status-website:
  cname: status.kora.maxwi.com
  logoUrl: https://kora.maxwi.com/favicon.ico
  name: Kora Status

workflowSchedule:
  uptime:
    - cron: "*/5 * * * *"
  responseTime:
    - cron: "*/5 * * * *"
  graphs:
    - cron: "0 */6 * * *"
  staticSite:
    - cron: "0 1 * * *"
  summary:
    - cron: "0 0 * * *"
